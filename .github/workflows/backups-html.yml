name: 自动镜像网站

env:
  TZ: Asia/Shanghai

on:
  schedule:
    - cron: '40 3 */7 * *'  
  workflow_dispatch:

jobs:
  backup-html:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 安装 HTTrack
      run: |
        sudo apt-get update
        sudo apt-get install -y httrack webhttrack
        
    - name: 创建镜像目录
      run: |
        mkdir -p backups/html
        
    - name: 设置日期变量
      id: date
      run: |
        echo "date=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
        
    - name: 创建临时目录
      run: |
        mkdir -p /tmp/httrack-backup
        
    - name: 执行 HTTrack 镜像
      run: |
        BACKUP_DIR="/tmp/httrack-backup/asbackroom-${{ steps.date.outputs.date }}"
        mkdir -p "$BACKUP_DIR"
        
        cd /tmp/httrack-backup
        
        httrack "https://asbackroom.wikidot.com/system:list-all-pages" -O "$BACKUP_DIR" \
            --mirror \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            --depth=3 \
            --stay-on-same-domain \
            --robots=0 \
            --verbose
            
        echo "镜像完成，保存在: $BACKUP_DIR"
        
    - name: 检查镜像是否成功
      run: |
        BACKUP_DIR="/tmp/httrack-backup/asbackroom-${{ steps.date.outputs.date }}"
        
        if [ -d "$BACKUP_DIR" ] && [ "$(ls -A $BACKUP_DIR)" ]; then
          echo "镜像成功，目录不为空"
        else
          echo "镜像可能失败，目录为空"
          exit 1
        fi
        
    - name: 压缩镜像文件
      run: |
        cd /tmp/httrack-backup
        BACKUP_NAME="asbackroom-${{ steps.date.outputs.date }}"
        tar -czf "$GITHUB_WORKSPACE/backups/html/${BACKUP_NAME}.tar.gz" "$BACKUP_NAME"
        
    - name: 生成镜像信息
      run: |
        cd $GITHUB_WORKSPACE/backups/html
        BACKUP_FILE="asbackroom-${{ steps.date.outputs.date }}.tar.gz"
        
        cat > backup_info_${{ steps.date.outputs.date }}.md << EOF
        # 镜像信息
        - **镜像时间**: ${{ steps.date.outputs.date }}
        - **镜像文件**: ${BACKUP_FILE}
        - **镜像大小**: $(du -h ${BACKUP_FILE} | cut -f1)
        - **网站**: https://asbackroom.wikidot.com/
        EOF
        
    - name: 更新软链接
      run: |
        cd $GITHUB_WORKSPACE/backups/html
        rm -f latest-backup latest-backup-info
        ln -s "asbackroom-${{ steps.date.outputs.date }}.tar.gz" "latest-backup"
        ln -s "backup_info_${{ steps.date.outputs.date }}.md" "latest-backup-info"

    - name: 清理旧镜像（仅保留最近10个）
      run: |
        cd $GITHUB_WORKSPACE/backups/html
        
        # 删除超出的压缩包：按时间排序(ls -t)，保留前10个，从第11个开始删除
        ls -t asbackroom-*.tar.gz | tail -n +11 | xargs -r rm --
        
        # 删除超出的信息文件：同理保留最近10个
        ls -t backup_info_*.md | tail -n +11 | xargs -r rm --
        
        echo "清理完成。当前镜像目录下剩余文件："
        ls -lh
        
    - name: 提交镜像到仓库
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        git add backups/html
        
        if git diff --staged --quiet; then
          echo "没有新的镜像文件需要提交"
        else
          git commit -m "自动镜像网站 - ${{ steps.date.outputs.date }}"
          git pull --rebase origin master
          git push origin master
        fi
        
    - name: 上传镜像文件作为工作流附件
      uses: actions/upload-artifact@v4
      with:
        name: asbackroom-backup-${{ steps.date.outputs.date }}
        path: backups/html/asbackroom-${{ steps.date.outputs.date }}.tar.gz
        retention-days: 30

    - name: 清理临时文件
      run: |
        rm -rf /tmp/httrack-backup
