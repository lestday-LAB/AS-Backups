name: иҮӘеҠЁеӨҮд»ҪзҪ‘з«ҷ

concurrency:
  group: backup-wikit
  cancel-in-progress: false

env:
  TZ: Asia/Shanghai

on:
  schedule:
    - cron: '20 3 */8 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup-wikit:
    runs-on: ubuntu-latest

    env:
      WIKIT_BIN: "./wikit"
      BACKUP_ROOT: "backups/wikit"
      WIKI_NAME: "write-on-paper"
      WIKI_URL: "https://write-on-paper.wikidot.com"
      MAX_BACKUPS: "8"
      BACKUP_TIME_THRESHOLD: "3"

    steps:
      - name: жЈҖеҮәд»“еә“д»Јз Ғ
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: дёӢиҪҪ Wikit CLI
        run: |
          set -euo pipefail
          URL="https://github.com/kakushi-w/wikit/releases/latest/download/wikit-linux-amd64"
          curl -fSL "$URL" -o wikit
          chmod +x wikit
          ./wikit version || true

      - name: еҮҶеӨҮеӨҮд»Ҫзӣ®еҪ•е№¶иҝҗиЎҢ Wikit CLI
        run: |
          set -euo pipefail

          mkdir -p "$BACKUP_ROOT"

          TS=$(date +%Y%m%d_%H%M%S)
          THIS_DIR="$BACKUP_ROOT/$TS"

          PREV=$(ls -1d "$BACKUP_ROOT"/*/ 2>/dev/null | sort -r | head -1 || true)

          if [ -n "$PREV" ] && [ -d "$PREV" ]; then
            echo "вҶ’ Copying previous backup from $PREV"
            cp -r "$PREV" "$THIS_DIR"
          else
            echo "вҶ’ No previous backup found, creating fresh directory"
            mkdir -p "$THIS_DIR"
          fi

          echo "вҶ’ Running wikit backup into $THIS_DIR"

          # и®°еҪ•ејҖе§Ӣж—¶й—ҙ
          START_SEC=$(date +%s)

          "$WIKIT_BIN" backup "$WIKI_NAME" \
            --base-dir "$THIS_DIR" \
            --no-update-check

          # и®Ўз®—иҖ—ж—¶
          END_SEC=$(date +%s)
          ELAPSED=$((END_SEC - START_SEC))

          echo "вҶ’ Backup elapsed time: ${ELAPSED}s"

          echo "BACKUP_TS=$TS" >> $GITHUB_ENV
          echo "BACKUP_ELAPSED=$ELAPSED" >> $GITHUB_ENV

      - name: еҲӨж–ӯжҳҜеҗҰйңҖиҰҒжҸҗдәӨ
        id: check_sitemap
        run: |
          set -euo pipefail

          cd "$BACKUP_ROOT"

          CURRENT=$(ls -1d */ 2>/dev/null | sort -r | head -1)
          PREV=$(ls -1d */ 2>/dev/null | sort -r | head -2 | tail -1 || true)

          echo "CURRENT=$CURRENT"
          echo "PREV=$PREV"

          CURRENT_SITEMAP="$CURRENT/$WIKI_NAME/meta/sitemap.json"
          PREV_SITEMAP="$PREV/$WIKI_NAME/meta/sitemap.json"

          ELAPSED="${{ env.BACKUP_ELAPSED }}"
          THRESHOLD="${BACKUP_TIME_THRESHOLD}"

          echo "вҶ’ Backup elapsed: ${ELAPSED}s (threshold: ${THRESHOLD}s)"

          # еҰӮжһңеӨҮд»ҪиҖ—ж—¶и¶…иҝҮйҳҲеҖјпјҢејәеҲ¶жҸҗдәӨ
          if [ "$ELAPSED" -ge "$THRESHOLD" ]; then
            echo "вҶ’ Backup took >= ${THRESHOLD}s, force commit"
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "reason=timeout" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ -z "$PREV" ] || [ ! -f "$PREV_SITEMAP" ]; then
            echo "вҶ’ No previous sitemap found, must commit"
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "reason=new" >> $GITHUB_OUTPUT
            exit 0
          fi

          if diff -q "$CURRENT_SITEMAP" "$PREV_SITEMAP" > /dev/null; then
            echo "вҶ’ sitemap.json unchanged, skip commit"
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "reason=unchanged" >> $GITHUB_OUTPUT
          else
            echo "вҶ’ sitemap.json changed"
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "reason=changed" >> $GITHUB_OUTPUT
          fi

      - name: жё…зҗҶж—§еӨҮд»Ҫ
        run: |
          set -euo pipefail
          cd "$BACKUP_ROOT"
          ls -1trd */ 2>/dev/null | head -n -"$MAX_BACKUPS" | while IFS= read -r old; do
            echo "вҶ’ Removing old backup: $old"
            rm -rf "$old"
          done
          echo "вҶ’ Current backups:"
          ls -1d */ 2>/dev/null || echo "(none)"

      - name: жӣҙж–° LATEST иҪҜй“ҫжҺҘжҢҮеҗ‘жңҖж–°еӨҮд»Ҫ
        run: |
          set -euo pipefail
          cd "$BACKUP_ROOT"
          NEWEST=$(ls -1d */ 2>/dev/null | sort -r | head -1)
          if [ -z "$NEWEST" ]; then
            echo "::error::No backup directory found!"
            exit 1
          fi
          rm -f LATEST
          ln -s "$NEWEST" LATEST
          echo "вҶ’ LATEST -> $NEWEST"

      - name: жҸҗдәӨе№¶жҺЁйҖҒеӨҮд»Ҫз»“жһң
        if: steps.check_sitemap.outputs.skip == 'false'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "иҮӘеҠЁеӨҮд»ҪзҪ‘з«ҷ - ${{ env.BACKUP_TS }}пјҲ${{ steps.check_sitemap.outputs.reason }}пјү"
          file_pattern: "backups/wikit/"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          push_options: "--force-with-lease"

      - name: и·іиҝҮжҸҗдәӨжҸҗзӨә
        if: steps.check_sitemap.outputs.skip == 'true'
        run: echo "[!] жңӘеҸ‘з”ҹеҸҳеҢ–пјҢе·Іи·іиҝҮжҸҗдәӨгҖӮ"
