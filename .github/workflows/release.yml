name: 月度备份发行版

on:
  schedule:
    - cron: "0 12 28-31 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 计算版本号与年月前缀
        run: |
          echo "VERSION=$(date -u -d '+8 hours' +'%Y.%m')" >> $GITHUB_ENV
          echo "YYYYMM=$(date -u -d '+8 hours' +'%Y%m')" >> $GITHUB_ENV
          echo "DATE_FULL=$(date -u -d '+8 hours' +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_ENV
          
      - name: 判断发布时间及条件
        if: github.event_name == 'schedule'
        run: |
          TODAY=$(date -u -d '+8 hours' +%d)
          TOMORROW=$(date -u -d "+8 hours +1 day" +%d)
          if [ "$TODAY" = "$TOMORROW" ]; then
            echo "不是当月最后一天，跳过发布"
            echo "SHOULD_RELEASE=false" >> $GITHUB_ENV
          else
            echo "SHOULD_RELEASE=true" >> $GITHUB_ENV
          fi
          
      - name: 手动触发强制发布
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "SHOULD_RELEASE=true" >> $GITHUB_ENV

      - name: 查找并准备 HTML 备份文件
        if: env.SHOULD_RELEASE == 'true'
        run: |
          HTML_SRC=$(ls -1 backups/html/asbackroom-*.tar.gz | sort -r | head -n 1)
          cp "$HTML_SRC" "${{ env.YYYYMM }}_backup_html.tar.gz"
          echo "HTML_ASSET=${{ env.YYYYMM }}_backup_html.tar.gz" >> $GITHUB_ENV

      - name: 查找并打包 Wikit 备份目录
        if: env.SHOULD_RELEASE == 'true'
        run: |
          LATEST_DIR=$(ls -1d backups/wikit/*/ | sort -r | head -n 1)
          tar -czf "${{ env.YYYYMM }}_backup_wikit.tar.gz" -C "$LATEST_DIR" .
          echo "WIKIT_ASSET=${{ env.YYYYMM }}_backup_wikit.tar.gz" >> $GITHUB_ENV

      - name: 生成发行说明
        if: env.SHOULD_RELEASE == 'true'
        run: |
          echo "本发行版为后室AS层群网站月度备份（${{ env.VERSION }}），由 GitHub Actions 于每月末自动生成，概不保证实时性，仅供历史版本与备份恢复使用。" >> release_body.md
          echo "" >> release_body.md
          echo "## 📅 备份信息" >> release_body.md
          echo "- **发行版本**：\`${{ env.VERSION }}\`" >> release_body.md
          echo "- **生成时间**：${{ env.DATE_FULL }}" >> release_body.md
          echo "" >> release_body.md
          echo "## 📦 发行内容" >> release_body.md
          echo "所有备份文件均为 \`.tar.gz\` 压缩格式：" >> release_body.md
          echo "" >> release_body.md
          echo "| 类型 | 文件名 | 说明 |" >> release_body.md
          echo "|----|----|----|" >> release_body.md
          echo "| 🌐 HTML | \`${{ env.HTML_ASSET }}\` | HTML 静态站点数据 |" >> release_body.md
          echo "| 📖 WIKIT | \`${{ env.WIKIT_ASSET }}\` | Wikit CLI 备份细节数据 |" >> release_body.md

      - name: 创建 GitHub Release
        if: env.SHOULD_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          body_path: release_body.md
          draft: false
          prerelease: false
          files: |
            ${{ env.HTML_ASSET }}
            ${{ env.WIKIT_ASSET }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 跳过发布提示
        if: env.SHOULD_RELEASE == 'false'
        run: |
          echo "[√] Workflow 正常结束，但未到达发布时间，已跳过 Release 创建"
